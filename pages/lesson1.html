<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tiny's Blog</title>
    <link rel="shortcut icon" href="../images/tiny.png" />
    <link rel="icon" href="../images/tiny.png" type="image/png" />
    <link rel="stylesheet" type="text/css" href="../css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="../css/lesson1.css">
    <link rel="stylesheet" type="text/css" href="../css/lesson1/move.css">
    <link rel="stylesheet" type="text/css" href="../css/lesson1/shape.css">
    <link rel="stylesheet" type="text/css" href="../css/lesson1/anim.css">
    <link rel="stylesheet" type="text/css" href="../css/lesson1/flip.css">
    <script src="../js/zepto.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-default">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#"></a>
            </div>
        </div>
    </nav>
    <div class="wrap">
        <div class="container">
            <div class="row">
                <div class="col-xs-2 menu">
                    <ul>
                        <li for="move" class="active">移动</li>
                        <li for="shape">移动变形</li>
                        <li for="flip">翻转</li>
                        <li for="anim">扩散动画</li>
                    </ul>
                </div>
                <div class="col-xs-10">
                    <div class="layout move hide">
                        <div class="line vertical"></div>
                        <div class="line horizontal"></div>
                        <div class="matrix left" data-class="fly-left">点这里</div>
                        <div class="matrix right" data-class="fly-right">点这里</div>
                        <div class="matrix top" data-class="fly-top">点这里</div>
                        <div class="matrix bottom" data-class="fly-bottom">点这里</div>
                        <div class="matrix fly" data-class=""></div>
                    </div>
                    <div class="layout shape hide">
                        <div class="box">走起</div>
                    </div>
                    <div class="layout flip hide">
                        <div class="btn-group">
                            <button class="btn btn-sm btn-info" data-class="h-flipped">横向翻转</button>
                            <button class="btn btn-sm btn-warning" data-class="v-flipped">纵向翻转</button>
                            <div class="clearfix"></div>
                        </div>
                        <section class="box">
                            <div id="card">
                                <figure class="front">1</figure>
                                <figure class="back">2</figure>
                            </div>
                        </section>
                    </div>
                    <div class="layout anim">
                        <div class="dot"></div>
                        <div class="box"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="../js/utils.js"></script>
<script src="../js/lesson1.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tiny's Blog</title>
    <link rel="shortcut icon" href="images/tiny.png" />
    <link rel="icon" href="images/tiny.png" type="image/png" />
    <link rel="stylesheet" type="text/css" href="../css/bootstrap.min.css">
    <style type="text/css">
    html,
    body {
        width: 100%;
        height: 100%;
    }
    
    div {
        width: 500px;
        margin: 100px auto;
    }
    
    canvas {
        background-color: #eee;
    }
    </style>
</head>

<body>
    <div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>
    <script type="text/javascript">
    var canvas = document.getElementById('canvas');
    var context = canvas.getContext('2d');

    var opacity = 0;
    var centerCircleCanvas = createCanvas();
    var centerCircleCtx = centerCircleCanvas.getContext('2d');
    var centerCircleTimer = setInterval(function() {
        if (opacity <= 1) {
            clear();
            opacity += 0.01;
            drawCenterCircle(centerCircleCtx, opacity);
            context.drawImage(centerCircleCanvas, 0, 0);
        } else {
            clearInterval(centerCircleTimer);
            dropFirstCircle(80);
        }
    }, 10);

    var outCircleTimer = null;
    var outCircleCanvas = createCanvas();
    var outCircleCtx = outCircleCanvas.getContext('2d');
    var outCircleBegin = -0.5;
    var outCircleEnd = -0.5;
    var outCircleStep = 0.02;

    function dropFirstCircle(r) {
        outCircleTimer = setInterval(function() {
            if (outCircleEnd <= 1.6) {
                outCircleEnd += 0.02;
                clear();
                outCircleCtx.drawImage(centerCircleCanvas, 0, 0);
                drawCircle(outCircleCtx, r, outCircleBegin, outCircleEnd);
                context.drawImage(outCircleCanvas, 0, 0);
            } else {
                clearInterval(outCircleTimer);
            }
        }, 10);
    }

    function createCanvas() {
        var nCanvas = document.createElement('canvas');
        nCanvas.width = canvas.width;
        nCanvas.height = canvas.height;
        return nCanvas;
    }

    function drawCenterCircle(ctx, opacity) {
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = opacity;
        ctx.arc(250, 250, 50, 0, 2 * Math.PI);
        ctx.fill();
        ctx.restore();
    }

    function drawCircle(ctx, r, begin, end) {
        ctx.save();
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.strokeStyle = '#eee';
        ctx.arc(250, 250, r, begin * Math.PI, end * Math.PI);
        ctx.stroke();
        ctx.restore();
    }

    function clear() {
        context.clearRect(0, 0, 500, 500);
    }
    </script>
</body>

</html>

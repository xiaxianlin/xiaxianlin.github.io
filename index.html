<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.rawgit.com/konvajs/konva/1.2.2/konva.min.js"></script>
    <meta charset="utf-8">
    <title>Konva Shape Events Demo</title>
    <style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #F0F0F0;
    }
    </style>
</head>

<body>
    <div id="container"></div>
    <script>
    function writeMessage(message) {
        text.setText(message);
        layer.draw();
    }

    var stage = new Konva.Stage({
        container: 'container',
        width: 300,
        height: 300
    });
    stage.on('mousewheel', function(e) {
        console.log(e);
    });
    var layer = new Konva.Layer();

    layer.add(text);
    stage.add(layer);
    </script>
</body>

</html>

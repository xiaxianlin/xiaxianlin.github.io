<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tiny's Blog</title>
    <link rel="shortcut icon" href="images/tiny.png" />
    <link rel="icon" href="images/tiny.png" type="image/png" />
    <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
</head>

<body>
    <div class="wrap">
        <div class="button-group">
            <button id="split">Split</button>
            <button id="cube">Cube</button>
            <button id="carouselX">CarouselX</button>
            <button id="carouselY">CarouselY</button>
        </div>
        <div class="container">
            <div class="main" id="main">
                <div class="box box1"></div>
                <div class="box box2"></div>
                <div class="box box3"></div>
                <div class="box box4"></div>
                <div class="box box5"></div>
                <div class="box box6"></div>
                <div class="box box7"></div>
                <div class="box box8"></div>
                <div class="box box9"></div>
            </div>
        </div>
    </div>
    <script>
    var main = document.querySelector('#main'),
        carouselX = document.querySelector('#carouselX'),
        carouselY = document.querySelector('#carouselY'),
        cube = document.querySelector('#cube'),
        split = document.querySelector('#split'),
        carouselXOnClick = function(event) {
            onclick('carouselX');
        },
        carouselYOnClick = function(event) {
            onclick('carouselY');
        },
        cubeOnClick = function(event) {
            onclick('cube');
        },
        splitOnClick = function(event) {
            onclick('split');
        };

    carouselX.addEventListener('click', carouselXOnClick, false);
    carouselY.addEventListener('click', carouselYOnClick, false);
    split.addEventListener('click', splitOnClick, false);
    cube.addEventListener('click', cubeOnClick, false);

    function hasClass(node, className) {
        var cName = node.className;
        if (cName.indexOf(className) !== -1) {
            return true;
        } else {
            return false;
        }
    }

    function onclick(className) {
        if (hasClass(main, className)) {
            main.className = 'main';
        } else {
            main.className = 'main ' + className;
        }
    }
    </script>
</body>

</html>

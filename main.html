<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tiny's Blog</title>
    <link rel="shortcut icon" href="images/tiny.png" />
    <link rel="icon" href="images/tiny.png" type="image/png" />
    <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
</head>

<body>
    <div class="wrap">
        <div class="container">
            <div class="main" id="main">
                <div class="box box1"></div>
                <div class="box box2"></div>
                <div class="box box3"></div>
                <div class="box box4"></div>
                <div class="box box5" id="carousel">Carousel</div>
                <div class="box box6"></div>
                <div class="box box7"></div>
                <div class="box box8"></div>
                <div class="box box9"></div>
            </div>
        </div>
    </div>
    <script>
    var isCarouse = false;
        main = document.querySelector('#main'),
        carousel = document.querySelector('#carousel'),
        carouselOnClick = function(event){
            if(isCarouse){
                isCarouse = false;
                main.className = 'main';
            }else{
                isCarouse = true;
                main.className = 'main carousel';
            }
        };

        carousel.addEventListener('click', carouselOnClick, false);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Map</title>
    <style type="text/css">
    html,
    body {
        height: 100%;
        margin: 0px;
        padding: 0px;
        font-family: "微软雅黑";
        font-size: 14px;
    }
    
    #allmap {
        height: 100%;
        width: 100%;
    }
    </style>
</head>

<body>
    <div id="allmap"></div>
    <script src="http://libs.baidu.com/jquery/1.9.0/jquery.js"></script>
    <script src="http://api.map.baidu.com/api?v=2.0&ak=I3ZhVxcolj2jejTqK3cyqmiR" type="text/javascript"></script>
    <script type="text/javascript" src="map/addr.js"></script>
    <script type="text/javascript">
    var map = new BMap.Map("allmap");
    var city = '上海';
    map.centerAndZoom(city, 13);
    map.addControl(new BMap.OverviewMapControl());
    map.addControl(new BMap.NavigationControl());
    map.enableScrollWheelZoom(true);
    map.setMapStyle({
        style: 'midnight'
    });
    var index = 0;
    var myGeo = new BMap.Geocoder();

    function bdGEO() {
        var add = adds[index];
        console.log(add);
        geocodeSearch(add);
        index++;
        if(index == adds.length){
            alert('over');
        }
    }

    function geocodeSearch(add) {
        if (index < adds.length) {
            setTimeout(window.bdGEO, 100);
        }
        myGeo.getPoint(add, function(point) {
            if (point) {
                var address = new BMap.Point(point.lng, point.lat);
                addMarker(address, new BMap.Label('', {
                    offset: new BMap.Size(7.5, 10)
                }));
            }
        }, city);
    }
    // 编写自定义函数,创建标注
    function addMarker(point, label) {
        var marker = new BMap.Marker(point);
        map.addOverlay(marker);
        marker.setLabel(label);
    }
    bdGEO();
    </script>
</body>

</html>

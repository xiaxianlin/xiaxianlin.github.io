<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>高德地图</title>
    <style type="text/css">
    html,
    body {
        height: 100%;
        margin: 0px;
        padding: 0px;
        font-family: "微软雅黑";
        font-size: 14px;
    }

    #container {
        width: 100%;
        height: 100%;
    }
    </style>
</head>

<body>
    <div id="container"></div>
    <script src="addr.js"></script>
    <script src="http://webapi.amap.com/maps?v=1.3&key=b41c30eb094a6a50e75d9efe5681ac74"></script>
    <script>
    var colors = ['#f49d46', '#add4e3', '#00b1cd', '#8ccdbe', '#005da4', '#e0c5a6', '#f8cfb2', '#f8ec8c', '#b15c56', '#d4dcdd', '#86b9d8', '#4e872f', '#8c9a37', '#d39a65', '#96918d', '#b99abd', '#f49d46', '#add4e3', '#00b1cd', '#8ccdbe', '#005da4', '#e0c5a6', '#f8cfb2', '#f8ec8c', '#b15c56', '#d4dcdd', '#86b9d8', '#4e872f', '#8c9a37', '#d39a65', '#96918d', '#b99abd']
    var city = '上海';
    var map = new AMap.Map('container', {
        zoom: 12,
        center: [121.472641, 31.231707]
    });
    var features = ['bg', 'point', 'building'];
    map.setFeatures(features);
    map.setMapStyle('blue_night');
    AMap.service('AMap.DistrictSearch', function() { //回调函数
        //实例化DistrictSearch
        var districtSearch = new AMap.DistrictSearch({
            level: 'city',
            extensions: 'all'
        });
        districtSearch.search('上海市市辖区', function(status, result) {
            var dList = result.districtList[0].districtList;
            dList.forEach(function(item, i) {
                drawDistrict(item.adcode, colors[i]);
            });
        });

        function drawDistrict(name, color) {
            districtSearch.setLevel('district');
            districtSearch.search(name, function(status, result) {
                var bounds = result.districtList[0].boundaries;
                if (bounds) {
                    for (var i = 0, l = bounds.length; i < l; i++) {
                        polygon(bounds[i], color);
                    }
                }
            });
        }

        function polygon(path, color) {
            return new AMap.Polygon({
                map: map,
                strokeWeight: 1,
                path: path,
                fillOpacity: 0.3,
                fillColor: color,
                strokeColor: 'red'
            });
        }
    });
    //加载地理编码插件
    AMap.service(["AMap.Geocoder"], function() {
        var MGeocoder = new AMap.Geocoder({
            city: city, //城市，默认：“全国”
            radius: 100 //范围，默认：500
        });
        adds.forEach(function(add) {
            MGeocoder.getLocation(add, function(status, result) {
                if (status === 'complete' && result.info === 'OK') {
                    geocoder_CallBack(result);
                }
            });
        });

        function geocoder_CallBack(data) { //地理编码结果数组
            var geocode = data.geocodes[0];
            addmarker(geocode);
        }

        function addmarker(d) {
            var lngX = d.location.getLng();
            var latY = d.location.getLat();
            var size = new AMap.Size(30, 30);
            return new AMap.Marker({
                map: map,
                icon: new AMap.Icon({
                    // image: "http://fed.welian.com/common/marker_red_sprite.png",
                    size: size,
                    imageSize: size,
                }),
                offset: new AMap.Pixel(-24, -24),
                position: [lngX, latY]
            });
        }
    });
    </script>
</body>

</html>

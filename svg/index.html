<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SVG</title>
    <style media="screen">
        svg {
            display: block;
            margin: 150px auto;
            background: rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>
    <svg width="140" height="170" xmlns="http://www.w3.org/2000/svg">
        <title>Cat</title>
        <desc>Stick Figure of a Cat</desc>
        <circle cx="70" cy="95" r="50" style="stroke:black;fill:none;"/>
        <circle cx="55" cy="80" r="5" stroke="black" fill="#393"/>
        <circle cx="85" cy="80" r="5" stroke="black" fill="#393"/>
        <g id="whiskers">
            <line x1="75" y1="95" x2="135" y2="85" style="stroke:black;"/>
            <line x1="75" y1="95" x2="135" y2="108" style="stroke:black;"/>
        </g>
        <use xlink:href="#whiskers" transform="scale(-1 1) translate(-140 0)"/>
        <polyline points="108 62,90 10,70 45,50,10,32,62" style="stroke:black;fill:none;"/>
        <polyline points="35 110,45 120,95,120,105,110" style="stroke:black;fill:none;"/>
        <path d="M 75 90 L 65 90 A 5 10 0 0 0 75 90" style="stroke:black; fill:#fcc"/>
        <text x="55" y="165" style="font-family: sans-serif; font-size: 14pt; stroke: none; fill: black;">Cat</text>
    </svg>
</body>

</html>
